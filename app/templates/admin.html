{% extends "authenticated-base.html" %}

{% block additional_styles %}
<style>
   .admin-sort-btn {
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      color: inherit;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      text-decoration: none;
   }

   .admin-sort-btn:hover {
      color: #212529;
      opacity: 0.85;
   }

   .admin-sort-btn:focus,
   .admin-sort-btn:focus-visible {
      outline: none;
      box-shadow: none;
   }

   .admin-sort-indicator {
      min-width: 0.8rem;
      display: inline-block;
      text-align: center;
      color: #6c757d;
      font-size: 0.85rem;
      line-height: 1;
   }

   .admin-sort-btn.is-active .admin-sort-indicator {
      color: #212529;
      font-weight: 700;
   }
</style>
{% endblock %}

{% block external_js %}
<script src="{{ url_for('static', path='js/app.js')}}"></script>
{% endblock %}


{% block subpage_content %}
   <div class="container-fluid" id="admin-stats">
      <div class="row g-3 mb-4" id="admin-summary-cards"></div>
      <div class="card shadow-sm">
         <div class="card-body">
            <h5 class="card-title mb-3">Fleet By Location</h5>
            <div class="table-responsive">
               <table class="table table-striped">
                  <thead>
                     <tr>
                        <th>Location</th>
                        <th>Vehicles</th>
                     </tr>
                  </thead>
                  <tbody id="admin-location-breakdown"></tbody>
               </table>
            </div>
         </div>
      </div>

      <div class="card shadow-sm mt-4">
         <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
               <h5 class="card-title mb-0">Reservations</h5>
               <button class="btn btn-outline-secondary btn-sm" id="admin-refresh-reservations">Refresh</button>
            </div>
            <div class="table-responsive">
               <table class="table table-striped align-middle">
                  <thead>
                     <tr>
                        <th>ID</th>
                        <th>Vehicle</th>
                        <th>Plate</th>
                        <th>User</th>
                        <th>Driver</th>
                        <th>Start</th>
                        <th>End</th>
                        <th>Status</th>
                        <th>Actions</th>
                     </tr>
                  </thead>
                  <tbody id="admin-reservation-list"></tbody>
               </table>
            </div>
         </div>
      </div>

      <div class="card shadow-sm mt-4">
         <div class="card-body">
            <h5 class="card-title mb-3">Fleet Management</h5>
            <form id="admin-add-vehicle-form" class="row g-2 mb-4">
               <div class="col-md-2"><input class="form-control" name="make" placeholder="Make" required /></div>
               <div class="col-md-2"><input class="form-control" name="model" placeholder="Model" required /></div>
               <div class="col-md-2"><input class="form-control" name="year" type="number" placeholder="Year" required /></div>
               <div class="col-md-2"><input class="form-control" name="category" placeholder="Category" required /></div>
               <div class="col-md-2"><input class="form-control" name="price_per_day" type="number" step="0.01" placeholder="Price/Day" required /></div>
               <div class="col-md-2"><input class="form-control" name="location" placeholder="Location" required /></div>
               <div class="col-md-3"><input class="form-control" name="license_plate" placeholder="License Plate (optional)" /></div>
               <div class="col-md-3"><input class="form-control" name="url_image" placeholder="Image URL (optional)" /></div>
               <div class="col-md-2"><input class="form-control" name="seats" type="number" placeholder="Seats" /></div>
               <div class="col-md-2"><input class="form-control" name="transmission" placeholder="Transmission" /></div>
               <div class="col-md-2"><input class="form-control" name="fuel_type" placeholder="Fuel Type" /></div>
               <div class="col-md-12 d-grid d-md-flex justify-content-md-end">
                  <button class="btn btn-primary" type="submit">Add Vehicle</button>
               </div>
            </form>

            <div class="table-responsive">
               <table class="table table-striped align-middle">
                  <thead>
                     <tr>
                        <th><button type="button" class="admin-sort-btn admin-fleet-sort" data-sort-key="id">ID <span class="admin-sort-indicator" aria-hidden="true">↕</span></button></th>
                        <th><button type="button" class="admin-sort-btn admin-fleet-sort" data-sort-key="vehicle">Vehicle <span class="admin-sort-indicator" aria-hidden="true">↕</span></button></th>
                        <th><button type="button" class="admin-sort-btn admin-fleet-sort" data-sort-key="license_plate">Plate <span class="admin-sort-indicator" aria-hidden="true">↕</span></button></th>
                        <th><button type="button" class="admin-sort-btn admin-fleet-sort" data-sort-key="category">Category <span class="admin-sort-indicator" aria-hidden="true">↕</span></button></th>
                        <th><button type="button" class="admin-sort-btn admin-fleet-sort" data-sort-key="location">Location <span class="admin-sort-indicator" aria-hidden="true">↕</span></button></th>
                        <th><button type="button" class="admin-sort-btn admin-fleet-sort" data-sort-key="price_per_day">Price/Day <span class="admin-sort-indicator" aria-hidden="true">↕</span></button></th>
                        <th><button type="button" class="admin-sort-btn admin-fleet-sort" data-sort-key="available">Available <span class="admin-sort-indicator" aria-hidden="true">↕</span></button></th>
                        <th>Actions</th>
                     </tr>
                  </thead>
                  <tbody id="admin-fleet-list"></tbody>
               </table>
            </div>
         </div>
      </div>
   </div>

{% endblock %}
